services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ascendia}
      POSTGRES_USER: ${POSTGRES_USER:-ascendia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?isi POSTGRES_PASSWORD di file .env}
    volumes:
      - ascendia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgres://${POSTGRES_USER:-ascendia}:${POSTGRES_PASSWORD:?isi POSTGRES_PASSWORD di file .env}@db:5432/${POSTGRES_DB:-ascendia}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      AUTH_SECRET: ${AUTH_SECRET:?isi AUTH_SECRET di file .env}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-43200}
      DEV_ALLOW_OPERATOR_HEADER: "false"
      CORS_ORIGIN: ${CORS_ORIGIN:?isi CORS_ORIGIN di file .env}
    expose:
      - "8080"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN:?isi DOMAIN di file .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  ascendia_pgdata:
  caddy_data:
  caddy_config:
